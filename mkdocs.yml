site_name: pysatgeo
site_description: Python package for raster and vector geospatial processing
site_author: JPPereira93
site_url: https://JPPereira93.github.io/pysatgeo
repo_url: https://github.com/JPPereira93/pysatgeo

copyright: "Copyright &copy; 2024 - 2024 Joao Pereira"

theme:
    palette:
        - scheme: default
          toggle:
              icon: material/toggle-switch-off-outline
              name: Switch to dark mode
        - scheme: slate
          primary: indigo
          accent: indigo
          toggle:
              icon: material/toggle-switch
              name: Switch to light mode
    name: material
    icon:
        repo: fontawesome/brands/github
    features:
        - navigation.instant
        - navigation.tracking
        - navigation.top
        - search.highlight
        - search.share
    custom_dir: "docs/overrides"
    font:
        text: Google Sans
        code: Regular

plugins:
    - search
    - mkdocstrings
    - git-revision-date
    - git-revision-date-localized:
          enable_creation_date: true
          type: timeago
    - mkdocs-jupyter:
          include_source: True
          ignore_h1_titles: True
          execute: True
          allow_errors: false
          ignore: ["conf.py"]
          execute_ignore: ["*ignore.ipynb"]

markdown_extensions:
    - admonition
    - abbr
    - attr_list
    - def_list
    - footnotes
    - meta
    - md_in_html
    - pymdownx.superfences
    - pymdownx.highlight:
          linenums: true
    - toc:
          permalink: true

nav:
    - Home: index.md
    - Installation: installation.md
    - Usage: usage.md
    - Report Issues: https://github.com/JPPereira93/pysatgeo/issues
    - Examples:
        - examples/intro.ipynb
    - API Reference:
          - pysatgeo module: pysatgeo.md
          - raster module: raster.md
          - vector module: vector.md
          - raster_analysis module: raster_analysis.md
          - terrain module: terrain.md
          - sampling module: sampling.md
          - ranking module: ranking.md
          - styles module: styles.md
          - netcdf module: netcdf.md
          - gee module: gee.md
